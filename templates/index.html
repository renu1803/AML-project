<!DOCTYPE html>
<html>
<head>
    <title>ML Model Predictor</title>
</head>
<body>

    <h2>Enter Input Values</h2>

    <form action="/predict" method="post">
        <input type="text" name="feature1" placeholder="Feature 1" required><br><br>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
